name: Release LSP Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: zed-sheets-lsp-linux-x86_64.tar.gz
            bin_name: zed-sheets-lsp
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: zed-sheets-lsp-linux-aarch64.tar.gz
            bin_name: zed-sheets-lsp
          - runner: macos-latest
            target: x86_64-apple-darwin
            asset_name: zed-sheets-lsp-macos-x86_64.tar.gz
            bin_name: zed-sheets-lsp
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_name: zed-sheets-lsp-macos-aarch64.tar.gz
            bin_name: zed-sheets-lsp
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: zed-sheets-lsp-windows-x86_64.tar.gz
            bin_name: zed-sheets-lsp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross for Linux aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (native/cross-target)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release -p zed-sheets-lsp --target ${{ matrix.target }}

      - name: Build (Linux aarch64 via cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release -p zed-sheets-lsp --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/package/${{ matrix.bin_name }}"
          tar -czf "dist/${{ matrix.asset_name }}" -C dist/package "${{ matrix.bin_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
